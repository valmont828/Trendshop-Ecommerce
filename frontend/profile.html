<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon Profil — TrendShop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6c47ff;
      --primary-dark: #4f2fe0;
      --accent: #ff6b35;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #7a7a9d;
      --success: #22c55e;
      --danger: #ef4444;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(108,71,255,0.10);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(108,71,255,0.25);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      cursor: pointer;
    }

    .logo span { color: #ffd166; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .profile-menu { position: relative; }
    .profile-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .profile-btn:hover { background: rgba(255,255,255,0.3); }

    .dropdown-menu {
      position: absolute;
      top: 50px;
      right: 0;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      min-width: 200px;
      display: none;
      z-index: 1000;
      overflow: hidden;
    }
    .dropdown-menu.show { display: block; }

    .dropdown-item {
      padding: 12px 15px;
      color: var(--text);
      text-decoration: none;
      display: block;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: all 0.2s;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: var(--bg); color: var(--primary); }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .profile-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #f0f0f0;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      flex-shrink: 0;
    }

    .profile-info h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .profile-info p {
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text);
      font-size: 0.95rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e0e0f0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108,71,255,0.1);
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    button {
      flex: 1;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save {
      background: var(--primary);
      color: white;
    }

    .btn-save:hover {
      background: var(--primary-dark);
      transform: scale(1.02);
    }

    .btn-cancel {
      background: #f0f0f0;
      color: var(--text);
    }

    .btn-cancel:hover {
      background: #e0e0e0;
    }

    .btn-logout {
      background: var(--danger);
      color: white;
      flex: 1;
    }

    .btn-logout:hover {
      background: #dc2626;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #f0f0f0;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--text);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      z-index: 300;
      transition: transform 0.35s cubic-bezier(.4, 0, .2, 1);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .profile-header {
        flex-direction: column;
        text-align: center;
      }

      .container {
        padding: 1rem;
      }

      .page-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="window.location.href='index.html'">Trend<span>Shop</span></div>
  <div class="header-right">
    <div class="profile-menu">
      <button class="profile-btn" onclick="toggleProfileMenu()">👤</button>
      <div class="dropdown-menu" id="profileDropdown">
        <a class="dropdown-item" href="profile.html">Mon Profil</a>
        <a class="dropdown-item" href="my-orders.html">Mes Commandes</a>
        <a class="dropdown-item" onclick="logout()">Déconnexion</a>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <h1 class="page-title">Mon Profil 👤</h1>

  <div id="profileContent" class="loading">
    <div class="spinner"></div> Chargement du profil...
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_URL = 'http://localhost:5000/api';

  async function loadProfile() {
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = 'auth.html';
      return;
    }

    try {
      const res = await fetch(`${API_URL}/auth/profile`, {
        headers: { Authorization: `Bearer ${token}` }
      });

      if (!res.ok) throw new Error('Erreur de chargement du profil');

      const user = await res.json();
      displayProfile(user);
    } catch (error) {
      showToast('❌ Erreur: ' + error.message, 'error');
    }
  }

  function displayProfile(user) {
    const container = document.getElementById('profileContent');
    container.innerHTML = `
      <div class="profile-card">
        <div class="profile-header">
          <div class="profile-avatar">👤</div>
          <div class="profile-info">
            <h2>${user.name}</h2>
            <p>📧 ${user.email}</p>
            <p>📱 ${user.phone || 'Non renseigné'}</p>
          </div>
        </div>

        <div class="stats">
          <div class="stat-item">
            <div class="stat-number">0</div>
            <div class="stat-label">Commandes</div>
          </div>
          <div class="stat-item">
            <div class="stat-number">0,00 €</div>
            <div class="stat-label">Dépensé</div>
          </div>
          <div class="stat-item">
            <div class="stat-number">0</div>
            <div class="stat-label">Avis laissés</div>
          </div>
        </div>
      </div>

      <div class="profile-card">
        <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem;">✏️ Modifier mes informations</h3>
        
        <form id="profileForm" onsubmit="updateProfile(event)">
          <div class="form-row">
            <div class="form-group">
              <label>Nom complet</label>
              <input type="text" id="name" value="${user.name}" required>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" value="${user.email}" disabled style="background: #f5f5f5; cursor: not-allowed;">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Téléphone</label>
              <input type="tel" id="phone" value="${user.phone || ''}">
            </div>
            <div class="form-group">
              <label>Code Postal</label>
              <input type="text" id="postalCode" value="${user.postalCode || ''}">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Adresse</label>
              <input type="text" id="address" value="${user.address || ''}">
            </div>
            <div class="form-group">
              <label>Ville</label>
              <input type="text" id="city" value="${user.city || ''}">
            </div>
          </div>

          <div class="form-group">
            <label>Pays</label>
            <input type="text" id="country" value="${user.country || 'France'}">
          </div>

          <div class="button-group">
            <button type="submit" class="btn-save">💾 Sauvegarder les modifications</button>
            <button type="button" class="btn-cancel" onclick="window.location.href='index.html'">Annuler</button>
          </div>
        </form>
      </div>

      <div class="button-group" style="margin-top: 2rem;">
        <button class="btn-logout" onclick="logout()">🚪 Se déconnecter</button>
      </div>
    `;
  }

  async function updateProfile(e) {
    e.preventDefault();
    const token = localStorage.getItem('token');
    const btn = e.target.querySelector('.btn-save');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Sauvegarde...';

    try {
      const res = await fetch(`${API_URL}/auth/profile`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          phone: document.getElementById('phone').value,
          address: document.getElementById('address').value,
          city: document.getElementById('city').value,
          postalCode: document.getElementById('postalCode').value,
          country: document.getElementById('country').value,
        })
      });

      if (!res.ok) throw new Error('Erreur lors de la mise à jour');

      showToast('✅ Profil mis à jour avec succès!', 'success');
      setTimeout(() => loadProfile(), 1500);
    } catch (error) {
      showToast('❌ Erreur: ' + error.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '💾 Sauvegarder les modifications';
    }
  }

  function toggleProfileMenu() {
    const dropdown = document.getElementById('profileDropdown');
    dropdown.classList.toggle('show');
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'index.html';
  }

  function showToast(msg, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('profileDropdown');
    if (!e.target.closest('.profile-menu')) {
      dropdown.classList.remove('show');
    }
  });

  loadProfile();
</script>

</body>
</html>
